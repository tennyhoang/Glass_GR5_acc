services:
  - type: web
    name: glassesweb
    env: docker
    region: singapore
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: glassesweb-db
          property: connectionString

databases:
  - name: glassesweb-db
    plan: free
    region: singapore
    databaseName: glassesweb
    user: glassesweb
